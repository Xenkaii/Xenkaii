<svg width="26" height="34" viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lanternGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d9a8"/>
      <stop offset="100%" stop-color="#b8892e"/>
    </linearGradient>
  </defs>

  <!-- top cap -->
  <line x1="13" y1="1" x2="13" y2="5" stroke="#8c6d3f" stroke-width="1.4"/>
  <rect x="8" y="5" width="10" height="2.4" rx="1" fill="#8c6d3f"/>

  <!-- lantern body, gentle barrel curve -->
  <path d="M 8,7.4 Q 3,17 8,26.6 L 18,26.6 Q 23,17 18,7.4 Z"
        fill="none" stroke="url(#lanternGold)" stroke-width="1.6"/>

  <!-- horizontal ribs -->
  <path d="M 5.2,12 Q 13,14 20.8,12" fill="none" stroke="url(#lanternGold)" stroke-width="0.9" opacity="0.7"/>
  <path d="M 4.1,17 Q 13,19.4 21.9,17" fill="none" stroke="url(#lanternGold)" stroke-width="0.9" opacity="0.7"/>
  <path d="M 5.2,22 Q 13,24 20.8,22" fill="none" stroke="url(#lanternGold)" stroke-width="0.9" opacity="0.7"/>

  <!-- warm glow dot -->
  <circle cx="13" cy="17" r="2" fill="#e8524a" opacity="0.85"/>

  <!-- bottom tassel -->
  <rect x="8" y="26.6" width="10" height="2" rx="1" fill="#8c6d3f"/>
  <line x1="13" y1="28.6" x2="13" y2="33" stroke="#6b1010" stroke-width="1.4" stroke-linecap="round"/>
</svg>
